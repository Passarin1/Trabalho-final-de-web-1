<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contato | FitManager</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div id="site-header"></div>

    <main class="page-shell">
      <section class="section contact-grid">
        <div class="card">
          <span class="tag">Entre em contato</span>
          <h1>Estamos prontos para te atender.</h1>
          <p>Envie sua mensagem para tirar dúvidas sobre planos, estrutura, horários e matrícula.</p>
          <ul class="schedule-list">
            <li><strong>Telefone:</strong> (11) 3333-2222</li>
            <li><strong>E-mail:</strong> contato@fitmanager.com</li>
            <li><strong>Endereço:</strong> Rua das Flores, 123 - São Paulo</li>
            <li><strong>Horário:</strong> Segunda a sexta, das 6h às 22h</li>
          </ul>
        </div>
        <div class="card">
          <form class="form-stack">
            <label>
              Nome
              <input type="text" placeholder="Seu nome" />
            </label>
            <label>
              E-mail
              <input type="email" placeholder="seu@email.com" />
            </label>
            <label>
              Mensagem
              <textarea rows="5" placeholder="Escreva sua dúvida ou interesse"></textarea>
            </label>
            <button class="btn btn--primary" type="button">Enviar mensagem</button>
          </form>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>
    <script src="../js/app.js"></script>
  </body>
</html>
